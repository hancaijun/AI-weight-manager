<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1"/>
      <stop offset="100%" style="stop-color:#8b5cf6"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="120" fill="url(#bg)"/>
  <!-- Scale icon -->
  <g transform="translate(256,220)" fill="none" stroke="white" stroke-width="20" stroke-linecap="round">
    <!-- Balance beam -->
    <line x1="-180" y1="0" x2="180" y2="0"/>
    <!-- Center pillar -->
    <line x1="0" y1="0" x2="0" y2="160"/>
    <!-- Base -->
    <line x1="-60" y1="160" x2="60" y2="160"/>
    <!-- Left plate -->
    <path d="M-150,0 L-150,40 L-180,60 H-120 L-150,40" fill="white" fill-opacity="0.3"/>
    <!-- Right plate -->
    <path d="M150,0 L150,60 L180,80 H120 L150,60" fill="white" fill-opacity="0.3"/>
  </g>
  <!-- Text -->
  <text x="256" y="420" text-anchor="middle" fill="white" font-size="42" font-weight="bold" font-family="sans-serif">⚖️</text>
</svg>
